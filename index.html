<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재미로보는 24만신 - 이사 운세</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0A2E;--bg2:#1A1540;--bg3:#2D1B69;--card:#1E1A4A;--gold:#D4A017;--gold2:#F5D97A;--txt:#F0EBD8;--txt2:#B8A490;--txt3:#7A6858;--border:rgba(212,160,23,0.3)}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;min-height:100vh}
.phone{max-width:390px;margin:0 auto;background:var(--bg);min-height:760px}
.hero-banner img{width:100%;display:block}
#form-screen{padding:0.7rem 1rem 5rem}
.greeting{padding:0.5rem 0 0.8rem;font-size:0.78rem;color:var(--txt2);text-align:center;line-height:1.6}
.greeting strong{color:var(--gold)}
.input-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:0.7rem}
.input-card h4{font-size:0.7rem;color:var(--gold);font-weight:700;margin-bottom:0.8rem}
.inp{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:0.6rem 0.8rem;color:var(--txt);font-size:0.88rem;outline:none}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--txt3)}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.6rem}
.inp-lbl{font-size:0.67rem;color:var(--txt2);margin-bottom:0.3rem;font-weight:500}
.mbti-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:0.2rem 0}
.mbti-selected-badge{background:var(--gold);color:#0D0A2E;border-radius:5px;padding:0.2rem 0.55rem;font-size:0.75rem;font-weight:700}
.mbti-arrow{font-size:0.75rem;color:var(--txt2);transition:transform 0.2s}
.mbti-arrow.open{transform:rotate(180deg)}
.mbti-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;margin-top:0.7rem;max-height:0;overflow:hidden;transition:max-height 0.3s,opacity 0.2s;opacity:0}
.mbti-grid.show{max-height:200px;opacity:1}
.mbti-btn{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:0.4rem;color:var(--txt2);font-size:0.72rem;cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif}
.mbti-btn.sel{background:var(--gold);color:#0D0A2E;font-weight:700}
.go-btn{width:100%;margin-top:0.8rem;padding:0.9rem;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:12px;color:#0D0A2E;font-family:'Nanum Myeongjo',serif;font-size:1.1rem;font-weight:700;cursor:pointer}
#result-screen{display:none;padding:0 0 5rem}
.hero-card{margin:0 1rem 0.9rem;background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:1rem;display:grid;grid-template-columns:auto 1fr;gap:0.9rem}
.char-art{width:88px;height:108px;border-radius:11px;background:linear-gradient(135deg,#2A1A3A,#3A2060);display:flex;align-items:center;justify-content:center;border:2px solid var(--gold);position:relative;overflow:hidden}
.char-img{width:100%;height:100%;object-fit:cover;border-radius:9px}
.char-school{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:0.52rem;color:var(--gold2);font-weight:700;background:rgba(0,0,0,0.8);padding:2px 0;z-index:1}
.hero-tag{font-size:0.62rem;color:var(--gold2);margin-bottom:0.25rem}
.hero-title{font-family:'Nanum Myeongjo',serif;font-size:1rem;font-weight:800;line-height:1.4;color:var(--txt)}
.hero-title span{color:var(--gold2)}
.hero-sub{font-size:0.68rem;color:var(--txt2);margin-top:0.3rem}
.badge-row{display:flex;gap:0.3rem;margin-top:0.5rem;flex-wrap:wrap}
.badge{border-radius:5px;padding:0.2rem 0.45rem;font-size:0.67rem;font-weight:600}
.badge-el{background:rgba(230,100,80,0.2);color:#FF9080;border:1px solid rgba(230,100,80,0.4)}
.badge-mbti{background:rgba(212,160,23,0.2);color:var(--gold2);border:1px solid var(--border)}
.desc-txt{margin:0 1rem 0.9rem;font-size:0.84rem;line-height:1.85;color:var(--txt2);background:var(--card);border-radius:12px;padding:0.9rem 1rem;border-left:3px solid var(--gold)}
.desc-txt strong{color:var(--txt)}
.shaman-voice{font-family:'Nanum Myeongjo',serif;font-size:0.82rem;color:var(--gold2);font-weight:700;display:block;margin-bottom:0.4rem}
.sc-row{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin:0 1rem 0.9rem}
.score-box,.compass-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:0.8rem;text-align:center}
.score-lbl{font-size:0.63rem;color:var(--txt2);margin-bottom:0.5rem;font-weight:600}
.score-ring{width:80px;height:80px;margin:0 auto;position:relative}
.score-ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.score-ring-num .pct{font-family:'Nanum Myeongjo',serif;font-size:1.4rem;font-weight:800;color:var(--gold2)}
.score-sublbl{font-size:0.65rem;color:var(--txt2);margin-top:0.5rem}
.score-sublbl strong{color:var(--gold)}
.compass-sublbl{font-size:0.63rem;color:#4ECDC4;margin-top:0.5rem;font-weight:700;line-height:1.5}
.section-title{font-size:0.68rem;color:var(--gold);font-weight:700;margin:0 1rem 0.6rem;display:flex;align-items:center;gap:0.4rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.hood-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin:0 1rem 0.9rem}
.hood-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.hood-thumb{height:60px;display:flex;align-items:center;justify-content:center;font-size:1.9rem;background:var(--bg2);position:relative}
.hood-thumb .rank{position:absolute;top:4px;left:5px;font-size:0.58rem;font-weight:700;color:var(--gold);background:rgba(0,0,0,0.5);border-radius:3px;padding:1px 4px}
.hood-body{padding:0.4rem 0.5rem 0.5rem}
.hood-name{font-size:0.68rem;font-weight:700;color:var(--txt)}
.hood-desc{font-size:0.58rem;color:var(--txt2);margin-top:0.1rem}
.manga-quote-card{margin:0 1rem 0.9rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:0.85rem 1rem}
.q-label{font-size:0.62rem;color:var(--gold);font-weight:700;margin-bottom:0.4rem}
.q-text{font-family:'Nanum Myeongjo',serif;font-size:0.9rem;color:var(--gold2);line-height:1.7;font-style:italic;font-weight:700}
.q-interp{font-size:0.78rem;color:var(--txt2);line-height:1.65;margin-top:0.5rem}
.manga-quote-card cite{font-size:0.63rem;color:var(--txt3);margin-top:0.35rem;display:block}
.chanjo-btn{display:flex;align-items:center;justify-content:center;gap:0.5rem;width:calc(100% - 2rem);margin:0 1rem 0.4rem;padding:0.85rem;background:linear-gradient(135deg,#FAE100,#FFC800);border:none;border-radius:12px;color:#3A1A00;font-family:'Nanum Myeongjo',serif;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none}
.disclaimer{margin:0 1rem 0.9rem;background:var(--bg2);border-radius:10px;padding:0.6rem 0.9rem;text-align:center;border:1px solid var(--border)}
.disclaimer p{font-size:0.63rem;color:var(--txt3);line-height:1.6}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:390px;max-width:100%;background:rgba(13,10,46,0.97);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);padding:0.6rem 0 0.8rem;z-index:100;backdrop-filter:blur(15px)}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:0.25rem;cursor:pointer;opacity:0.5}
.tab-item.act{opacity:1}
.tab-item .ti{font-size:1.2rem}
.tab-item .tl{font-size:0.6rem;color:var(--txt2);font-weight:500}
.tab-item.act .tl{color:var(--gold);font-weight:700}
#spin-screen{display:none;text-align:center;padding:5rem 1rem}
.spin-sym{font-size:3rem;animation:rotate 1.6s linear infinite;color:var(--gold);display:block}
@keyframes rotate{to{transform:rotate(360deg)}}
.spin-txt{font-size:0.85rem;color:var(--txt2);margin-top:1rem}
</style>
</head>
<body>
<div class="phone">
<div class="hero-banner"><img src="hero-banner.png" alt="이사만신"></div>
<div id="form-screen">
<div class="greeting">신장(神將)이 기운을 읽습니다 — <strong>재미로만</strong> 보세요 😄</div>
<div class="input-card"><h4>✦ 기본 정보</h4><div class="inp-lbl">이름</div><input class="inp" id="i-name" placeholder="홍길동" style="margin-bottom:0.6rem"/><div class="inp-row"><div><div class="inp-lbl">생년월일 (8자리)</div><input class="inp" id="i-birth" placeholder="19760625" maxlength="8"/></div><div><div class="inp-lbl">태어난 시</div><select class="inp" id="i-hour"><option value="0">자시 23~01</option><option value="2">축시 01~03</option><option value="4">인시 03~05</option><option value="6">묘시 05~07</option><option value="8">진시 07~09</option><option value="10">사시 09~11</option><option value="12" selected>오시 11~13</option><option value="14">미시 13~15</option><option value="16">신시 15~17</option><option value="18">유시 17~19</option><option value="20">술시 19~21</option><option value="22">해시 21~23</option></select></div></div></div>
<div class="input-card"><h4>✦ MBTI</h4><div class="mbti-toggle" onclick="toggleMbti()"><div style="display:flex;align-items:center;gap:0.5rem"><span style="font-size:0.8rem;color:var(--txt2)">선택된 MBTI:</span><span class="mbti-selected-badge" id="mbti-display">ESTP</span></div><span class="mbti-arrow" id="mbti-arrow">▼</span></div><div class="mbti-grid" id="mbti-grid"><button class="mbti-btn" onclick="selMbti('INTJ',this)">INTJ</button><button class="mbti-btn" onclick="selMbti('INTP',this)">INTP</button><button class="mbti-btn" onclick="selMbti('ENTJ',this)">ENTJ</button><button class="mbti-btn" onclick="selMbti('ENTP',this)">ENTP</button><button class="mbti-btn" onclick="selMbti('INFJ',this)">INFJ</button><button class="mbti-btn" onclick="selMbti('INFP',this)">INFP</button><button class="mbti-btn" onclick="selMbti('ENFJ',this)">ENFJ</button><button class="mbti-btn" onclick="selMbti('ENFP',this)">ENFP</button><button class="mbti-btn" onclick="selMbti('ISTJ',this)">ISTJ</button><button class="mbti-btn" onclick="selMbti('ISFJ',this)">ISFJ</button><button class="mbti-btn" onclick="selMbti('ESTJ',this)">ESTJ</button><button class="mbti-btn" onclick="selMbti('ESFJ',this)">ESFJ</button><button class="mbti-btn" onclick="selMbti('ISTP',this)">ISTP</button><button class="mbti-btn" onclick="selMbti('ISFP',this)">ISFP</button><button class="mbti-btn sel" onclick="selMbti('ESTP',this)">ESTP</button><button class="mbti-btn" onclick="selMbti('ESFP',this)">ESFP</button></div></div>
<button class="go-btn" onclick="run()">🗝 24만신께 여쭤보기</button>
</div>
<div id="spin-screen"><span class="spin-sym">☯</span><div class="spin-txt">24만신이 팔자를 읽고 있습니다...</div></div>
<div id="result-screen"></div>
</div>
<div class="tab-bar"><div class="tab-item act" onclick="goHome()"><span class="ti">🏠</span><span class="tl">홈</span></div><div class="tab-item" onclick="window.open('https://open.kakao.com/o/sH5Vxeri','_blank')"><span class="ti">☕</span><span class="tl">찬조하기</span></div><div class="tab-item"><span class="ti">⭐</span><span class="tl">운세</span></div></div>
<script>

    element:'火 (화)',

    dir:'동남쪽 (巽方)',
    dirAngle:135,
    score:92,
    shamanOpening:'어이, 이 기운 심상치 않은데? 불꽃이 튀어오르는 팔자야.',
    desc:'화(火)의 기운이 넘쳐흐르는 분이시구나. 가만히 있으면 불씨가 꺼져. 지금 당장 움직여야 재물이 붙는 팔자란 말이지. 마치 강백호처럼 — 처음엔 아무것도 몰라도, 코트에 발을 들이는 순간 <strong>운명이 바뀌는 거야.</strong> 강남·홍대 같은 에너지 넘치는 도심 중심지로 이사가야 해.',
    mangaQuote:'"포기하면 그 순간이 시합 종료야."',
    mangaInterp:'형/언니가 솔직히 말해줄게 — 지금 망설이는 게 포기야. 이사 타이밍 잡는 게 딱 이 장면이라고.',
    mangaSource:'— 안선생, 슬램덩크',
    hoods:[{thumb:'🏙',rank:1,name:'강남구 신사동',desc:'활기찬 상권'},{thumb:'🎶',rank:2,name:'마포구 연남동',desc:'트렌디한 문화'},{thumb:'⚡',rank:3,name:'성동구 성수동',desc:'성장 에너지'}]
  },
  water:{
    img:'images/쇼타.png',
    emoji:'🍣',
    school:'초밥왕',
    charName:'쇼타',
    work:'미스터 초밥왕',
    element:'水 (수)',
    elementEmoji:'💧',
    dir:'북쪽 (坎方)',
    dirAngle:0,
    score:88,
    shamanOpening:'물처럼 고요한데 속이 깊은 팔자구나.',
    desc:'수(水) 기운은 낮은 곳으로 흘러 결국 바다를 이루지. 너무 고집 세우지 말고 흐름을 타야 해. <strong>한강변 대단지 브랜드 아파트</strong>가 네 수(水) 기운을 증폭시켜줘.',
    mangaQuote:'"최고의 맛은 재료가 만들고, 최고의 집은 입지가 만든다."',
    mangaInterp:'초밥왕 쇼타가 재료에 집착한 것처럼 — 입지 하나가 10년을 결정해.',
    mangaSource:'— 미스터 초밥왕',
    hoods:[{thumb:'🌊',rank:1,name:'마포구 합정동',desc:'한강변'},{thumb:'🏢',rank:2,name:'영등포 여의도',desc:'대단지'},{thumb:'🌿',rank:3,name:'성동구 뚝섬',desc:'물세권'}]
  },
  metal:{
    img:'images/가츠.png',
    emoji:'⚔️',
    school:'BERSERK',
    charName:'가츠',
    work:'베르세르크',
    element:'金 (금)',
    elementEmoji:'⚔️',
    dir:'서쪽 (兌方)',
    dirAngle:270,
    score:96,
    shamanOpening:'쇳덩어리 같은 기운이다. 단단해.',
    desc:'금(金) 기운은 날카롭고 정확해. <strong>판교·마곡 계획도시 신축 단지</strong>가 금(金)의 예리함과 맞아떨어져.',
    mangaQuote:'"전장을 보지 않고 전략을 짜는 자는 반드시 진다."',
    mangaInterp:'네이버 부동산만 보면 안 돼. 직접 현장 가봐야 금(金) 기운이 활성화돼.',
    mangaSource:'— 가츠, 베르세르크',
    hoods:[{thumb:'🏗',rank:1,name:'판교 테크밸리',desc:'IT 신축'},{thumb:'🛸',rank:2,name:'마곡 LG',desc:'계획도시'},{thumb:'🏛',rank:3,name:'위례 신도시',desc:'인프라'}]
  },
  wood:{
    img:'images/루피.png',
    emoji:'🏴‍☠️',
    school:'ONE PIECE',
    charName:'루피',
    work:'원피스',
    element:'木 (목)',
    elementEmoji:'🌿',
    dir:'동쪽 (震方)',
    dirAngle:90,
    score:88,
    shamanOpening:'나무처럼 위로만 자라려고 하네. 성장운이야.',

  earth:{

    school:'CANDY',
    charName:'캔디',
    work:'캔디캔디',
    element:'土 (토)',
    elementEmoji:'🏔️',
    dir:'남서쪽 (坤方)',
    dirAngle:225,
    score:90,
    shamanOpening:'뿌리 깊은 나무 같은 팔자야. 귀한 기운이야.',
    desc:'토(土) 기운은 오래 기다릴 줄 알아. <strong>전통 부촌 배산임수, 재건축 대장주</strong>가 토(土) 기운의 보금자리야.',

    mangaInterp:'재건축 대장주는 참을 줄 아는 사람이 먹어.',
    mangaSource:'— 캔디캔디',
    hoods:[{thumb:'🏯',rank:1,name:'서초구 방배동',desc:'배산임수'},{thumb:'🌺',rank:2,name:'용산구 이촌동',desc:'명당'},{thumb:'🏘',rank:3,name:'은평구 불광동',desc:'재건축'}]
  }

let m='ESTP',open=false;
function toggleMbti(){open=!open;document.getElementById('mbti-grid').classList.toggle('show',open);document.getElementById('mbti-arrow').classList.toggle('open',open)}
function selMbti(v,el){m=v;document.querySelectorAll('.mbti-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');document.getElementById('mbti-display').textContent=v;toggleMbti()}
function getSajuElement(b,h){const y=+b.slice(0,4),mo=+b.slice(4,6),d=+b.slice(6,8),hr=+h;return['fire','water','metal','wood','earth'][(y*13+mo*7+d*3+Math.floor(hr/2))%5]}
function run(){const n=document.getElementById('i-name').value.trim()||'이 분',b=document.getElementById('i-birth').value.trim(),h=document.getElementById('i-hour').value;if(b.length!==8||isNaN(b)){alert('생년월일 8자리 입력');return}document.getElementById('form-screen').style.display='none';document.getElementById('spin-screen').style.display='block';setTimeout(()=>show(n,DB[getSajuElement(b,h)],m),2000)}
function ring(p){const r=35,ci=220,d=ci*(p/100),g=ci-d;return`<svg viewBox="0 0 80 80" width="80" height="80"><circle cx="40" cy="40" r="35" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/><circle cx="40" cy="40" r="35" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round" stroke-dasharray="${d} ${g}" transform="rotate(-90 40 40)"/><defs><linearGradient id="g"><stop offset="0%" stop-color="#D4A017"/><stop offset="100%" stop-color="#F5D97A"/></linearGradient></defs></svg>`}
function needle(a){const r=a*(Math.PI/180),l=27,x2=(40+Math.sin(r)*l).toFixed(1),y2=(40-Math.cos(r)*l).toFixed(1);return`<svg viewBox="0 0 80 80" width="80" height="80" style="position:absolute;top:0;left:0"><line x1="40" y1="40" x2="${x2}" y2="${y2}" stroke="#4ECDC4" stroke-width="3.5" stroke-linecap="round"/><circle cx="40" cy="40" r="4" fill="#D4A017"/></svg>`}
function show(n,d,mb){document.getElementById('spin-screen').style.display='none';document.getElementById('result-screen').innerHTML=`<div class="hero-card"><div class="char-art" style="position:relative"><img src="${d.img}" class="char-img" alt="${d.charName}"><div class="char-school">${d.school}</div></div><div><div class="hero-tag">나의 이동 운명:</div><div class="hero-title"><span>${d.work}<br>${d.charName} 스타일!</span></div><div class="hero-sub">${d.elementEmoji} ${d.element} / MBTI: ${mb}</div><div class="badge-row"><span class="badge badge-el">${d.elementEmoji} ${d.element}</span><span class="badge badge-mbti">${mb}</span></div></div></div><div class="desc-txt"><span class="shaman-voice">🔮 ${d.shamanOpening}</span>${d.desc}</div><div class="sc-row"><div class="score-box"><div class="score-lbl">재물운 지수</div><div class="score-ring">${ring(d.score)}<div class="score-ring-num"><span class="pct">${d.score}%</span></div></div><div class="score-sublbl">재물운 <strong>길방(吉)</strong></div></div><div class="compass-box"><div class="score-lbl">방위 나침반</div><div style="width:80px;height:80px;margin:0 auto;position:relative">${needle(d.dirAngle)}<div style="position:absolute;top:2px;left:50%;transform:translateX(-50%);font-size:0.5rem;color:var(--txt3)">북</div><div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.5rem;color:var(--txt3)">남</div><div style="position:absolute;right:2px;top:50%;transform:translateY(-50%);font-size:0.5rem;color:var(--txt3)">동</div><div style="position:absolute;left:2px;top:50%;transform:translateY(-50%);font-size:0.5rem;color:var(--txt3)">서</div></div><div class="compass-sublbl">최적 이동 방향:<br>${d.dir}</div></div></div><div class="manga-quote-card"><div class="q-label">📖 만화 속 한 마디</div><div class="q-text">${d.mangaQuote}</div><div class="q-interp">${d.mangaInterp}</div><cite>${d.mangaSource}</cite></div><div class="section-title">✦ 추천 동네 TOP 3</div><div class="hood-row">${d.hoods.map(h=>`<div class="hood-card"><div class="hood-thumb">${h.thumb}<span class="rank">${h.rank}</span></div><div class="hood-body"><div class="hood-name">${h.name}</div><div class="hood-desc">${h.desc}</div></div></div>`).join('')}</div><div class="section-title">✦ 재미있으셨나요?</div><a href="https://open.kakao.com/o/sH5Vxeri" target="_blank" class="chanjo-btn">☕ 커피 한 잔 찬조하기</a><div style="margin:-0.1rem 1rem 0.9rem;text-align:center"><span style="font-size:0.63rem;color:var(--txt3)">오픈채팅으로 기프티콘 보내실 수 있어요 😊</span></div><div class="disclaimer"><p style="color:var(--txt2)"><strong style="color:var(--txt)">😄 재미로보는 24만신</strong><br>오락·재미 목적입니다.</p></div><div style="margin:0 1rem 0.5rem"><button onclick="reset()" style="width:100%;padding:0.7rem;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--txt2);font-size:0.82rem;cursor:pointer">☯ 다시 감정받기</button></div>`;document.getElementById('result-screen').style.display='block'}
function reset(){document.getElementById('result-screen').style.display='none';document.getElementById('form-screen').style.display='block'}
function goHome(){reset()}
</script>
</body>
</html>
