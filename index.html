*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0A2E;--bg2:#1A1540;--bg3:#2D1B69;--card:#1E1A4A;--gold:#D4A017;--gold2:#F5D97A;--txt:#F0EBD8;--txt2:#B8A490;--txt3:#7A6858;--border:rgba(212,160,23,0.3)}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;min-height:100vh}
.phone{max-width:390px;margin:0 auto;background:var(--bg);min-height:760px}
.hero-banner img{width:100%;display:block}
.tab-bar{background:rgba(13,10,46,0.97);border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);padding:0.6rem 0;backdrop-filter:blur(15px);position:sticky;top:0;z-index:100}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:0.25rem;cursor:pointer;opacity:0.5;transition:opacity 0.2s}
.tab-item.act{opacity:1}
.tab-item .ti{font-size:1.6rem}
.tab-item .tl{font-size:0.9rem;color:var(--txt2);font-weight:900}
.tab-item.act .tl{color:var(--gold);font-weight:700}
#form-screen,#gilil-screen{padding:0.7rem 1rem 2rem}
#gilil-screen{display:none}
.greeting{padding:0.5rem 0 0.8rem;font-size:0.78rem;color:var(--txt2);text-align:center;line-height:1.6}
.greeting strong{color:var(--gold)}
.input-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:0.7rem}
.input-card h4{font-size:0.7rem;color:var(--gold);font-weight:700;margin-bottom:0.8rem}
.inp{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:0.6rem 0.8rem;color:var(--txt);font-size:0.88rem;outline:none}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--txt3)}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.6rem}
.inp-lbl{font-size:0.67rem;color:var(--txt2);margin-bottom:0.3rem;font-weight:500}
.mbti-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:0.2rem 0}
.mbti-selected-badge{background:var(--gold);color:#0D0A2E;border-radius:5px;padding:0.2rem 0.55rem;font-size:0.75rem;font-weight:700}
.mbti-arrow{font-size:0.75rem;color:var(--txt2);transition:transform 0.2s}
.mbti-arrow.open{transform:rotate(180deg)}
.mbti-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;margin-top:0.7rem;max-height:0;overflow:hidden;transition:max-height 0.3s,opacity 0.2s;opacity:0}
.mbti-grid.show{max-height:200px;opacity:1}
.mbti-btn{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:0.4rem;color:var(--txt2);font-size:0.72rem;cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif}
.mbti-btn.sel{background:var(--gold);color:#0D0A2E;font-weight:700}
.go-btn{width:100%;margin-top:0.8rem;padding:0.9rem;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:12px;color:#0D0A2E;font-family:'Nanum Myeongjo',serif;font-size:1.1rem;font-weight:700;cursor:pointer}
#result-screen{display:none;padding:0 0 2rem}
.hero-card{margin:0 1rem 0.9rem;background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:1rem;display:grid;grid-template-columns:auto 1fr;gap:0.9rem}
.char-art{width:88px;height:108px;border-radius:11px;background:linear-gradient(135deg,#2A1A3A,#3A2060);display:flex;align-items:center;justify-content:center;border:2px solid var(--gold);position:relative;overflow:hidden}
.char-img{width:100%;height:100%;object-fit:cover;border-radius:9px}
.char-school{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:0.52rem;color:var(--gold2);font-weight:700;background:rgba(0,0,0,0.8);padding:2px 0;z-index:1}
.hero-tag{font-size:0.62rem;color:var(--gold2);margin-bottom:0.25rem}
.hero-title{font-family:'Nanum Myeongjo',serif;font-size:1rem;font-weight:800;line-height:1.4;color:var(--txt)}
.hero-title span{color:var(--gold2)}
.hero-sub{font-size:0.68rem;color:var(--txt2);margin-top:0.3rem}
.badge-row{display:flex;gap:0.3rem;margin-top:0.5rem;flex-wrap:wrap}
.badge{border-radius:5px;padding:0.2rem 0.45rem;font-size:0.67rem;font-weight:600}
.badge-el{background:rgba(230,100,80,0.2);color:#FF9080;border:1px solid rgba(230,100,80,0.4)}
.badge-mbti{background:rgba(212,160,23,0.2);color:var(--gold2);border:1px solid var(--border)}
.desc-txt{margin:0 1rem 0.9rem;font-size:0.84rem;line-height:1.85;color:var(--txt2);background:var(--card);border-radius:12px;padding:0.9rem 1rem;border-left:3px solid var(--gold)}
.desc-txt strong{color:var(--txt)}
.shaman-voice{font-family:'Nanum Myeongjo',serif;font-size:0.82rem;color:var(--gold2);font-weight:700;display:block;margin-bottom:0.4rem}
.sc-row{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin:0 1rem 0.9rem}
.score-box,.compass-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:0.8rem;text-align:center}
.score-lbl{font-size:0.63rem;color:var(--txt2);margin-bottom:0.5rem;font-weight:600}
.score-ring{width:80px;height:80px;margin:0 auto;position:relative}
.score-ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.score-ring-num .pct{font-family:'Nanum Myeongjo',serif;font-size:1.4rem;font-weight:800;color:var(--gold2)}
.score-sublbl{font-size:0.65rem;color:var(--txt2);margin-top:0.5rem}
.score-sublbl strong{color:var(--gold)}
.compass-sublbl{font-size:0.63rem;color:#4ECDC4;margin-top:0.5rem;font-weight:700;line-height:1.5}
.section-title{font-size:0.95rem;color:var(--gold);font-weight:900;margin:0 1rem 0.6rem;display:flex;align-items:center;gap:0.4rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.hood-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin:0 1rem 0.9rem}
.hood-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.hood-thumb{height:60px;display:flex;align-items:center;justify-content:center;font-size:1.9rem;background:var(--bg2);position:relative}
.hood-thumb .rank{position:absolute;top:4px;left:5px;font-size:0.58rem;font-weight:700;color:var(--gold);background:rgba(0,0,0,0.5);border-radius:3px;padding:1px 4px}
.hood-body{padding:0.4rem 0.5rem 0.5rem}
.hood-name{font-size:0.68rem;font-weight:700;color:var(--txt)}
.hood-desc{font-size:0.58rem;color:var(--txt2);margin-top:0.1rem}
.furniture-row{display:grid;grid-template-columns:repeat(2,1fr);gap:0.6rem;margin:0 1rem 0.9rem}
.furniture-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0.7rem;text-align:center}
.furniture-icon{font-size:2rem;margin-bottom:0.4rem}
.furniture-name{font-size:0.72rem;font-weight:700;color:var(--txt);margin-bottom:0.2rem}
.furniture-desc{font-size:0.58rem;color:var(--txt2)}
.manga-quote-card{margin:0 1rem 0.9rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:0.85rem 1rem}
.q-label{font-size:0.62rem;color:var(--gold);font-weight:700;margin-bottom:0.4rem}
.q-text{font-family:'Nanum Myeongjo',serif;font-size:0.9rem;color:var(--gold2);line-height:1.7;font-style:italic;font-weight:700}
.q-interp{font-size:0.78rem;color:var(--txt2);line-height:1.65;margin-top:0.5rem}
.manga-quote-card cite{font-size:0.63rem;color:var(--txt3);margin-top:0.35rem;display:block}
.share-row{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin:0 1rem 0.9rem}
.share-btn{display:flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.7rem;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--txt);font-size:0.75rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600}
.share-btn:active{background:var(--bg3)}
.chanjo-btn{display:flex;align-items:center;justify-content:center;gap:0.5rem;width:calc(100% - 2rem);margin:0 1rem 0.4rem;padding:0.85rem;background:linear-gradient(135deg,#FAE100,#FFC800);border:none;border-radius:12px;color:#3A1A00;font-family:'Nanum Myeongjo',serif;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none}
.disclaimer{margin:0 1rem 0.9rem;background:var(--bg2);border-radius:10px;padding:0.6rem 0.9rem;text-align:center;border:1px solid var(--border)}
.disclaimer p{font-size:0.63rem;color:var(--txt3);line-height:1.6}
#spin-screen{display:none;text-align:center;padding:5rem 1rem}
.spin-sym{font-size:3rem;animation:rotate 1.6s linear infinite;color:var(--gold);display:block}
@keyframes rotate{to{transform:rotate(360deg)}}
.spin-txt{font-size:0.85rem;color:var(--txt2);margin-top:1rem}
.saju-detail{font-size:0.65rem;color:var(--txt3);margin-top:0.5rem;padding:0.5rem;background:rgba(0,0,0,0.2);border-radius:6px;line-height:1.6}
.gilil-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0.7rem 0.85rem;margin-bottom:0.5rem}
.gilil-card.super{border:2px solid var(--gold);background:var(--bg3)}
.gilil-date{font-family:'Nanum Myeongjo',serif;font-size:0.95rem;font-weight:800;color:var(--gold2);margin-bottom:0.3rem}
.gilil-info{font-size:0.68rem;color:var(--txt2);line-height:1.5}
.gilil-tag{display:inline-block;background:rgba(212,160,23,0.2);color:var(--gold2);padding:0.15rem 0.4rem;border-radius:4px;font-size:0.58rem;margin-right:0.3rem;margin-top:0.2rem}
.gilil-tag.super{background:var(--gold);color:#0D0A2E;font-weight:700}
.page-title{font-family:'Nanum Myeongjo',serif;font-size:1.2rem;font-weight:800;color:var(--gold2);text-align:center;margin-bottom:1rem}
.month-group{margin:0 1rem 1.2rem}
.month-header{font-family:'Nanum Myeongjo',serif;font-size:0.85rem;font-weight:700;color:var(--gold);margin-bottom:0.6rem;padding-bottom:0.3rem;border-bottom:1px solid var(--border)}

</head>

function getJulianDay(y,m,d){if(m<=2){y-=1;m+=12}const A=Math.floor(y/100);const B=2-A+Math.floor(A/4);return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5}
function getIpchun(year){const y=year-2000;const ipchunDay=Math.floor(3.87+0.242*y-Math.floor(y/4));return new Date(year,1,ipchunDay)}

function calculateFullSaju(birth,hourVal){
  const year=parseInt(birth.slice(0,4));
  const month=parseInt(birth.slice(4,6));
  const day=parseInt(birth.slice(6,8));
  const hour=parseInt(hourVal);
  const ipchun=getIpchun(year);
  const birthDate=new Date(year,month-1,day);
  let sajuYear=year;
  if(birthDate<ipchun){sajuYear=year-1}
  const yearIdx=(sajuYear-4)%60;
  const yearPillar=GAPJA[yearIdx];
  const yearGan=yearPillar[0];
  const monthGanStart=WOLGON[yearGan];
  const monthGanIdx=CHEONGAN.indexOf(monthGanStart);
  const monthJijiIdx=(month+1)%12;
  const monthGan=CHEONGAN[(monthGanIdx+month-1)%10];
  const monthJiji=JIJI[monthJijiIdx];
  const monthPillar=monthGan+monthJiji;
  const jd=getJulianDay(year,month,day);
  const dayIdx=Math.floor((jd+49)%60);
  const dayPillar=GAPJA[dayIdx];
  const ilgan=dayPillar[0];
  const sijuGanStart=SIJU_START[ilgan];
  const sijuGanIdx=CHEONGAN.indexOf(sijuGanStart);
  const hourIdx=Math.floor(hour/2);
  const sijuGan=CHEONGAN[(sijuGanIdx+hourIdx)%10];
  const sijuJiji=JIJI[hourIdx];
  const hourPillar=sijuGan+sijuJiji;
  const element=ILGAN_TO_OHANG[ilgan];
  return{element:element,ilgan:ilgan,yearPillar:yearPillar,monthPillar:monthPillar,dayPillar:dayPillar,hourPillar:hourPillar,sajuYear:sajuYear};
}

function findGilil(ilgan,days=60){
  const today=new Date();
  const gilils=[];
  for(let i=0;i<days;i++){
    const date=new Date(today);
    date.setDate(today.getDate()+i);
    const y=date.getFullYear();
    const m=date.getMonth()+1;
    const d=date.getDate();
    const jd=getJulianDay(y,m,d);
    const dayIdx=Math.floor((jd+49)%60);
    const dayPillar=GAPJA[dayIdx];
    const dayGan=dayPillar[0];
    const dayJiji=dayPillar[1];
    const jijiIdx=JIJI.indexOf(dayJiji);
    const tags=[];
    let score=0;
    if(HAP[ilgan]===dayGan){tags.push('천간합');score+=3}
    const dayOfWeek=date.getDay();
    if(dayOfWeek===0||dayOfWeek===6){tags.push('주말');score+=1}
    const soneopneunDays=SONEOPNEUN[m];
    if(soneopneunDays&&soneopneunDays.includes(jijiIdx)){tags.push('손없는날');score+=2}
    if(tags.includes('천간합')&&tags.includes('손없는날')){tags.push('대길일');score+=5}
    if(tags.length>0){
      gilils.push({date:`${m}월 ${d}일 (${['일','월','화','수','목','금','토'][dayOfWeek]})`,year:y,month:m,day:d,dayPillar:dayPillar,tags:tags,score:score,isSuper:tags.includes('대길일')});
    }
  }
  gilils.sort((a,b)=>b.score-a.score);
  return gilils;
}

  const gililHTML=top3.map(g=>{const cardClass=g.isSuper?'gilil-card super':'gilil-card';return`<div class="${cardClass}"><div class="gilil-date">📅 ${g.date}</div><div class="gilil-info">일주: ${g.dayPillar}</div>${g.tags.map(t=>{const tagClass=t==='대길일'?'gilil-tag super':'gilil-tag';return`<span class="${tagClass}">${t}</span>`}).join('')}</div>`}).join('');
  const furnitureHTML=furnitures.map(f=>`<div class="furniture-card"><div class="furniture-icon">${f.icon}</div><div class="furniture-name">${f.name}</div><div class="furniture-desc">${f.desc}</div></div>`).join('');
  document.getElementById('result-screen').innerHTML=`<div class="hero-card"><div class="char-art" style="position:relative"><img src="${randomChar.img}" class="char-img" alt="${randomChar.name}"><div class="char-school">${randomChar.school}</div></div><div><div class="hero-tag">나의 이동 운명:</div><div class="hero-title"><span>${randomChar.name} 스타일!</span></div><div class="hero-sub">${d.elementEmoji} ${d.element} / MBTI: ${mb}</div>${sajuDisplay}<div class="badge-row"><span class="badge badge-el">${d.elementEmoji} ${d.element}</span><span class="badge badge-mbti">${mb}</span></div></div></div><div class="desc-txt"><span class="shaman-voice">🔮 ${d.shamanOpening}</span>${d.desc}</div><div class="sc-row"><div class="score-box"><div class="score-lbl">재물운 지수</div><div class="score-ring">${ring(d.score)}<div class="score-ring-num"><span class="pct">${d.score}%</span></div></div><div class="score-sublbl">재물운 <strong>길방(吉)</strong></div></div><div class="compass-box"><div class="score-lbl">방위 나침반</div><div style="width:80px;height:80px;margin:0 auto;position:relative">${needle(d.dirAngle)}<div style="position:absolute;top:2px;left:50%;transform:translateX(-50%);font-size:0.5rem;color:var(--txt3)">북</div><div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.5rem;color:var(--txt3)">남</div><div style="position:absolute;right:2px;top:50%;transform:translateY(-50%);font-size:0.5rem;color:var(--txt3)">동</div><div style="position:absolute;left:2px;top:50%;transform:translateY(-50%);font-size:0.5rem;color:var(--txt3)">서</div></div><div class="compass-sublbl">최적 이동 방향:<br>${d.dir}</div></div></div><div class="section-title">✦ 이사 길일 TOP 3</div><div style="margin:0 1rem 0.9rem">${gililHTML}</div><div class="section-title">✦ 어울리는 가구</div><div class="furniture-row">${furnitureHTML}</div><div class="manga-quote-card"><div class="q-label">📖 만화 속 한 마디</div><div class="q-text">${d.mangaQuote}</div><div class="q-interp">${d.mangaInterp}</div><cite>${d.mangaSource}</cite></div><div class="section-title">✦ 추천 동네 TOP 3</div><div class="hood-row">${d.hoods.map(h=>`<div class="hood-card"><div class="hood-thumb">${h.thumb}<span class="rank">${h.rank}</span></div><div class="hood-body"><div class="hood-name">${h.name}</div><div class="hood-desc">${h.desc}</div></div></div>`).join('')}</div><div class="section-title">✦ 결과 공유하기</div><div class="share-row"><button class="share-btn" onclick="shareKakao()">💬 카톡 공유</button><button class="share-btn" onclick="copyLink()">🔗 링크 복사</button></div><div class="section-title">✦ 재미있으셨나요?</div><a href="https://open.kakao.com/o/sH5Vxeri" target="_blank" class="chanjo-btn">☕ 커피 한 잔 찬조하기</a><div style="margin:-0.1rem 1rem 0.9rem;text-align:center"><span style="font-size:0.63rem;color:var(--txt3)">오픈채팅으로 기프티콘 보내실 수 있어요 😊</span></div><div class="disclaimer"><p style="color:var(--txt2)"><strong style="color:var(--txt)">😄 재미로보는 24만신</strong><br>만세력 알고리즘으로 사주팔자를 계산합니다. 오락 목적입니다.</p></div><div style="margin:0 1rem 0.5rem"><button onclick="reset()" style="width:100%;padding:0.7rem;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--txt2);font-size:0.82rem;cursor:pointer">☯ 다시 감정받기</button></div>`;
  document.getElementById('result-screen').style.display='block';
}

function reset(){document.getElementById('result-screen').style.display='none';document.getElementById('form-screen').style.display='block'}
function goHome(){document.getElementById('form-screen').style.display='block';document.getElementById('gilil-screen').style.display='none';document.getElementById('result-screen').style.display='none';document.getElementById('tab-home').classList.add('act');document.getElementById('tab-gilil').classList.remove('act')}
function goGilil(){document.getElementById('form-screen').style.display='none';document.getElementById('gilil-screen').style.display='block';document.getElementById('result-screen').style.display='none';document.getElementById('tab-home').classList.remove('act');document.getElementById('tab-gilil').classList.add('act')}
</script>
</body>
</html>
