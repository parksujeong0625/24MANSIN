<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 그라디언트 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1540;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D1B69;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D97A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A017;stop-opacity:1" />
    </linearGradient>
    <!-- 빛나는 효과 -->
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#D4A017;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- 배경 -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
  
  <!-- 빛나는 원 -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)" opacity="0.4"/>
  
  <!-- 금색 원형 테두리 -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#goldGrad)" stroke-width="8" opacity="0.6"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.4"/>
  
  <!-- 중앙 "24" 숫자 -->
  <text x="256" y="220" font-family="Nanum Myeongjo, serif" font-size="120" font-weight="800" fill="url(#goldGrad)" text-anchor="middle">24</text>
  
  <!-- "만신" 한자 -->
  <text x="256" y="330" font-family="Nanum Myeongjo, serif" font-size="48" font-weight="700" fill="#F0EBD8" text-anchor="middle" opacity="0.9">萬神</text>
  
  <!-- 장식 별들 -->
  <circle cx="140" cy="140" r="4" fill="#F5D97A" opacity="0.8"/>
  <circle cx="372" cy="140" r="3" fill="#F5D97A" opacity="0.6"/>
  <circle cx="140" cy="372" r="3" fill="#F5D97A" opacity="0.7"/>
  <circle cx="372" cy="372" r="4" fill="#F5D97A" opacity="0.8"/>
  
  <!-- 상단 작은 별 -->
  <path d="M 256 80 L 260 92 L 272 92 L 262 100 L 266 112 L 256 104 L 246 112 L 250 100 L 240 92 L 252 92 Z" fill="#F5D97A" opacity="0.7"/>
  
  <!-- 하단 작은 별 -->
  <path d="M 256 432 L 260 420 L 272 420 L 262 412 L 266 400 L 256 408 L 246 400 L 250 412 L 240 420 L 252 420 Z" fill="#F5D97A" opacity="0.7"/>
</svg>
